name: Tests

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    # Run Monday morning at 3 o'clock
    #       ┌───────────── minute (0 - 59)
    #       │ ┌───────────── hour (0 - 23)
    #       │ │ ┌───────────── day of the month (1 - 31)
    #       │ │ │ ┌───────────── month (1 - 12)
    #       │ │ │ │ ┌───────────── day of the week (0 - 6)
    #       │ │ │ │ │
    #       │ │ │ │ │
    #       │ │ │ │ │
    - cron: 0 3 * * 1
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      php: ${{ steps.php.outputs.version }}
      latest_php: ${{ steps.php.outputs.highest }}
      laravel: ${{ steps.laravel.outputs.matrix }}
      latest_laravel: ${{ steps.laravel.outputs.latest }}
    steps:
      - uses: actions/checkout@v6

      - id: php
        uses: WyriHaximus/github-action-composer-php-versions-in-range@v2

      - id: laravel
        name: Read Laravel versions from composer.json
        run: |
          node <<'JS' >> "$GITHUB_OUTPUT"
          const fs = require('fs');

          const composer = JSON.parse(fs.readFileSync('composer.json', 'utf8'));
          const constraint = composer['require-dev']['laravel/framework'];
          const majors = [...constraint.matchAll(/\^(\d+)\.0/g)].map((match) => match[1]);
          const versions = [...new Set(majors)].map((major) => `^${major}.0`);

          console.log(`matrix=${JSON.stringify(versions)}`);
          console.log(`latest=${versions[versions.length - 1]}`);
          JS

  tests:
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJSON(needs.matrix.outputs.php) }}
        laravel: ${{ fromJSON(needs.matrix.outputs.laravel) }}
        stability: [prefer-lowest, prefer-stable]
        exclude:
          - php: 8.2
            laravel: ^13.0
    name: P=${{ matrix.php }} L=${{ matrix.laravel }} ${{ matrix.stability }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSER_NO_INTERACTION: 1

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-file: development
          coverage: none
          extensions: pdo_sqlite

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-${{ matrix.php }}-${{ matrix.stability }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-${{ matrix.php }}-${{ matrix.stability }}-composer-

      - run: composer update --prefer-dist --no-progress --${{ matrix.stability }} --with "illuminate/contracts:${{ matrix.laravel }}" --with "laravel/framework:${{ matrix.laravel }}"

      - name: Run tests
        run: composer tests

  coverage:
    needs: matrix
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSER_NO_INTERACTION: 1

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.matrix.outputs.latest_php }}
          ini-file: development
          coverage: pcov
          extensions: pdo_sqlite

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-${{ needs.matrix.outputs.latest_php }}-prefer-stable-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-${{ needs.matrix.outputs.latest_php }}-prefer-stable-composer-

      - run: composer update --prefer-dist --no-progress --prefer-stable --with "illuminate/contracts:${{ needs.matrix.outputs.latest_laravel }}" --with "laravel/framework:${{ needs.matrix.outputs.latest_laravel }}"

      - name: Run tests with coverage
        run: composer tests-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
